<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J-AP Plus</title>
  <script src="/vendor/tailwindcdn.js"></script>
  <style>
    body { background:#f7fafc; color:#0f172a; }
    .panel { background:#fff; border:1px solid #e2e8f0; border-radius:12px; }
    .state-node rect { fill:#fff; stroke:#e2e8f0; }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-[1400px] mx-auto p-4 space-y-4">
    <header class="panel p-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-semibold">J-AP Plus</h1>
        <p class="text-sm text-slate-500">需求驱动的设计图纸生成引擎</p>
      </div>
      <div class="text-sm">
        <span id="wsStatus" class="px-2 py-1 rounded bg-slate-100">WebSocket: disconnected</span>
      </div>
    </header>

    <section class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div class="panel p-4 lg:col-span-1 space-y-3">
        <h2 class="font-semibold">需求输入</h2>
        <textarea id="requirementInput" class="w-full h-40 border rounded p-2" placeholder="请输入需求，例如：我要做一个多租户 SAAS 扫码点餐系统"></textarea>
        <button id="designBtn" class="w-full bg-blue-600 text-white rounded px-4 py-2" onclick="startDesignOnly()">生成设计套件</button>
      </div>

      <div class="panel p-4 lg:col-span-2 space-y-3">
        <div class="flex items-center justify-between">
          <h2 class="font-semibold">状态机</h2>
          <span class="text-sm text-slate-500">任务 ID: <span id="currentTaskId">--</span></span>
        </div>
        <svg viewBox="0 0 1420 220" class="w-full h-[220px] border rounded bg-slate-50">
          <g id="arrows" fill="none" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)">
            <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#94A3B8"/></marker></defs>
            <path d="M 160 70 L 210 70" data-from="IDLE" data-to="INTENT_ANALYSIS" class="state-arrow"/>
            <path d="M 370 70 L 420 70" data-from="INTENT_ANALYSIS" data-to="MODELING" class="state-arrow"/>
            <path d="M 580 70 L 630 70" data-from="MODELING" data-to="REVIEW" class="state-arrow"/>
            <path d="M 760 70 L 810 70" data-from="REVIEW" data-to="DETAILING" class="state-arrow"/>
            <path d="M 980 70 L 1030 70" data-from="DETAILING" data-to="PRESENTATION" class="state-arrow"/>
            <path d="M 1220 70 L 1270 70" data-from="PRESENTATION" data-to="COMPLETED" class="state-arrow"/>
            <path d="M 700 100 L 700 170 L 500 170 L 500 100" data-from="REVIEW" data-to="MODELING" class="state-arrow"/>
          </g>
          <g id="nodes">
            <g class="state-node" data-state="IDLE" transform="translate(20,35)"><rect width="140" height="70" rx="10"/><text x="70" y="42" text-anchor="middle">IDLE</text></g>
            <g class="state-node" data-state="INTENT_ANALYSIS" transform="translate(210,35)"><rect width="160" height="70" rx="10"/><text x="80" y="42" text-anchor="middle">INTENT</text></g>
            <g class="state-node" data-state="MODELING" transform="translate(420,35)"><rect width="160" height="70" rx="10"/><text x="80" y="42" text-anchor="middle">MODELING</text></g>
            <g class="state-node" data-state="REVIEW" transform="translate(630,35)"><rect width="130" height="70" rx="10"/><text x="65" y="42" text-anchor="middle">REVIEW</text></g>
            <g class="state-node" data-state="DETAILING" transform="translate(810,35)"><rect width="170" height="70" rx="10"/><text x="85" y="42" text-anchor="middle">DETAILING</text></g>
            <g class="state-node" data-state="PRESENTATION" transform="translate(1030,35)"><rect width="190" height="70" rx="10"/><text x="95" y="42" text-anchor="middle">PRESENTATION</text></g>
            <g class="state-node" data-state="COMPLETED" transform="translate(1270,35)"><rect width="130" height="70" rx="10"/><text x="65" y="42" text-anchor="middle">COMPLETED</text></g>
            <g class="state-node" data-state="FAILED" transform="translate(1270,135)"><rect width="130" height="70" rx="10"/><text x="65" y="42" text-anchor="middle">FAILED</text></g>
          </g>
        </svg>
      </div>
    </section>

    <section class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div class="panel p-4 space-y-3">
        <h2 class="font-semibold">LLM 设置（会话隔离）</h2>
        <input id="llmBaseUrl" class="w-full border rounded p-2" placeholder="https://api.deepseek.com" />
        <input id="llmApiKey" type="password" class="w-full border rounded p-2" placeholder="API Key" />
        <input id="llmModelName" class="w-full border rounded p-2" placeholder="deepseek-chat" />
        <button class="w-full border rounded p-2" onclick="saveSettings()">保存设置</button>
      </div>

      <div class="panel p-4 space-y-3">
        <h2 class="font-semibold">工作目录（全局共享）</h2>
        <input id="workspacePath" class="w-full border rounded p-2" placeholder="D:/xxx/output" onchange="validateWorkspace()" />
        <p id="workspaceStatus" class="text-sm text-slate-500">未设置</p>
      </div>

      <div class="panel p-4">
        <h2 class="font-semibold mb-2">日志</h2>
        <div id="logContainer" class="h-56 overflow-auto text-sm space-y-2"></div>
      </div>
    </section>
  </div>

<script>
const API_BASE = '';
const SESSION_LLM_CONFIG_KEY = 'jap.llm.session.config';
const LOCAL_WORKSPACE_PATH_KEY = 'jap.workspace.path';
const STATE_ORDER = ['IDLE','INTENT_ANALYSIS','MODELING','REVIEW','DETAILING','PRESENTATION','COMPLETED','FAILED'];
let ws = null;
let wsReconnectTimer = null;
let currentTaskId = null;

function getSessionLlmConfig(){
  try{const raw=sessionStorage.getItem(SESSION_LLM_CONFIG_KEY);return raw?JSON.parse(raw):null;}catch{return null;}
}
function setSessionLlmConfig(config){ if(config?.apiKey){sessionStorage.setItem(SESSION_LLM_CONFIG_KEY, JSON.stringify(config));}}
function getWorkspacePathConfig(){ const p=localStorage.getItem(LOCAL_WORKSPACE_PATH_KEY); return p?{path:p}:null; }
function setWorkspacePathConfig(p){ if(!p){localStorage.removeItem(LOCAL_WORKSPACE_PATH_KEY);return;} localStorage.setItem(LOCAL_WORKSPACE_PATH_KEY,p); }

function updateWsStatus(status){ document.getElementById('wsStatus').textContent = `WebSocket: ${status}`; }

function connectWebSocket(taskId){
  if(taskId!==undefined&&taskId!==null) currentTaskId=taskId;
  if(ws && (ws.readyState===WebSocket.OPEN || ws.readyState===WebSocket.CONNECTING)) return;
  if(wsReconnectTimer){ clearTimeout(wsReconnectTimer); wsReconnectTimer=null; }
  updateWsStatus('connecting');
  const protocol = location.protocol==='https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}/ws`);
  ws.onopen=()=>updateWsStatus('connected');
  ws.onmessage=(e)=>{
    const evt = JSON.parse(e.data);
    const eventTaskId = evt?.data?.taskId ?? null;
    if(eventTaskId!==currentTaskId) return;
    handleEvent(evt);
  };
  ws.onclose=()=>{ updateWsStatus('disconnected'); ws=null; wsReconnectTimer=setTimeout(()=>connectWebSocket(currentTaskId),3000); };
  ws.onerror=()=>updateWsStatus('disconnected');
}

function connectWebSocketForTask(taskId){ currentTaskId=taskId||null; connectWebSocket(currentTaskId); }

function addLog(type,msg){
  const el=document.createElement('div');
  el.className='border rounded p-2 bg-slate-50';
  el.textContent=`[${new Date().toLocaleTimeString()}] ${type}: ${msg}`;
  const c=document.getElementById('logContainer'); c.appendChild(el); c.scrollTop=c.scrollHeight;
}

function activateState(stateName){
  document.querySelectorAll('.state-node').forEach(node=>{
    const s=node.dataset.state;
    const rect=node.querySelector('rect');
    const isActive=s===stateName;
    const isCompleted=STATE_ORDER.indexOf(s)>-1&&STATE_ORDER.indexOf(s)<STATE_ORDER.indexOf(stateName)&&s!=='FAILED';
    rect.setAttribute('fill', isActive?'#dbeafe':(isCompleted?'#dcfce7':'#ffffff'));
    rect.setAttribute('stroke', isActive?'#3b82f6':(isCompleted?'#16a34a':'#e2e8f0'));
  });
}

function handleEvent(event){
  if(event.type==='STAGE_CHANGED'){ activateState(event.data.to||'IDLE'); addLog('状态', `${event.data.from} -> ${event.data.to}`); }
  if(event.type==='LOG_ADDED'){ addLog(event.data.logType||'INFO', `${event.data.title||''} ${event.data.summary||''}`.trim()); }
  if(event.type==='TASK_FINISHED'){
    const doneState = event.data.status==='COMPLETED' ? 'COMPLETED':'FAILED';
    activateState(doneState);
    addLog('结果', doneState);
  }
}

function buildTaskLlmConfig(){
  const baseUrl=(document.getElementById('llmBaseUrl').value||'').trim();
  const apiKey=(document.getElementById('llmApiKey').value||'').trim();
  const modelName=(document.getElementById('llmModelName').value||'').trim();
  const sessionLlm=getSessionLlmConfig();
  const resolved={baseUrl:baseUrl||sessionLlm?.baseUrl||'https://api.deepseek.com',apiKey:apiKey||sessionLlm?.apiKey||'',modelName:modelName||sessionLlm?.modelName||'deepseek-chat'};
  if(!resolved.apiKey) return null;
  setSessionLlmConfig(resolved);
  return resolved;
}
function buildTaskWorkspaceConfig(){
  const p=(document.getElementById('workspacePath').value||'').trim();
  if(p){setWorkspacePathConfig(p);return {path:p};}
  return getWorkspacePathConfig()||{};
}

async function startDesignOnly(){
  const requirement=(document.getElementById('requirementInput').value||'').trim();
  if(!requirement){ addLog('错误','请先输入需求'); return; }
  const llm=buildTaskLlmConfig();
  if(!llm){ addLog('错误','请先填写 API Key'); return; }
  const workspace=buildTaskWorkspaceConfig();
  addLog('系统','正在提交任务...');
  const resp=await fetch(API_BASE+'/api/v1/tasks/design-only',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({requirement,llm,workspace})});
  const data=await resp.json();
  if(!resp.ok){ addLog('错误', data?.message || '提交失败'); return; }
  currentTaskId=data.taskId;
  document.getElementById('currentTaskId').textContent=currentTaskId;
  activateState('INTENT_ANALYSIS');
  connectWebSocketForTask(currentTaskId);
}

function saveSettings(){
  const llm=buildTaskLlmConfig();
  if(!llm){ alert('请填写 API Key'); return; }
  const p=(document.getElementById('workspacePath').value||'').trim();
  setWorkspacePathConfig(p);
  validateWorkspace();
  alert('设置已保存');
}
function validateWorkspace(){
  const p=(document.getElementById('workspacePath').value||'').trim();
  const s=document.getElementById('workspaceStatus');
  if(!p){ s.textContent='未设置'; setWorkspacePathConfig(''); return; }
  s.textContent='Output path: '+p;
  setWorkspacePathConfig(p);
}

async function loadSettings(){
  try{
    const r=await fetch(API_BASE+'/api/v1/config');
    if(r.ok){
      const d=await r.json();
      document.getElementById('llmBaseUrl').value=d?.llm?.baseUrl||'https://api.deepseek.com';
      document.getElementById('llmModelName').value=d?.llm?.modelName||'deepseek-chat';
      document.getElementById('workspacePath').value=d?.workspace?.path||'output';
    }
  }catch{}
  const s=getSessionLlmConfig();
  if(s){
    document.getElementById('llmBaseUrl').value=s.baseUrl||'';
    document.getElementById('llmApiKey').value=s.apiKey||'';
    document.getElementById('llmModelName').value=s.modelName||'';
  }
  const w=getWorkspacePathConfig();
  if(w?.path) document.getElementById('workspacePath').value=w.path;
  validateWorkspace();
}

document.addEventListener('DOMContentLoaded',()=>{ loadSettings(); connectWebSocket(null); activateState('IDLE'); });
</script>
</body>
</html>
