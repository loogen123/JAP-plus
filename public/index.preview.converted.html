<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=/index.html" />
  <title>J-Architect-Pilot 预览入口</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --text: #1f2937;
      --muted: #64748b;
      --line: #e2e8f0;
      --link: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      line-height: 1.6;
    }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>页面已迁移</h1>
    <p>该预览文件已统一为 UTF-8，并跳转到最新页面 <a href="/index.html">/index.html</a>。</p>
    <p class="muted">如果未自动跳转，请点击上面的链接手动进入。</p>
  </main>
</body>
</html>
